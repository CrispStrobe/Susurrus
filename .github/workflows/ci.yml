name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    # Guards against the issue #12 class of bug: source code being excluded by
    # an over-broad .gitignore rule (so fresh clones silently miss modules).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fail if any tracked source file is git-ignored
        run: |
          set -euo pipefail
          ignored=""
          while IFS= read -r f; do
            if git check-ignore -q "$f"; then
              ignored="$ignored$f"$'\n'
            fi
          done < <(git ls-files '*.py')
          if [ -n "$ignored" ]; then
            echo "::error::These tracked Python source files match a .gitignore rule:"
            echo "$ignored"
            echo "Anchor the offending rule (e.g. '/diarization/' not 'diarization/')."
            exit 1
          fi
          echo "OK: no tracked source files are git-ignored."

      - name: Verify the diarization package is present
        run: |
          set -euo pipefail
          for f in backends/diarization/__init__.py backends/diarization/manager.py \
                   backends/diarization/compat.py backends/diarization/progress.py; do
            test -f "$f" || { echo "::error::missing source file: $f (issue #12)"; exit 1; }
          done
          echo "OK: diarization package is committed."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting tools
        # Pin exact versions so CI formatting/lint matches local pre-commit runs.
        # Unpinned tools drift (e.g. black's yearly style changes) and cause
        # "passes locally, fails in CI" churn.
        run: pip install ruff==0.15.7 black==25.9.0 isort==6.1.0 bandit==1.9.4

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Isort check
        run: isort --check --profile black --line-length 100 .

      - name: Bandit (high severity)
        run: bandit -r . -x ./tests,./.venv --severity-level high -q

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install --no-deps -e .

      - name: Install optional heavy deps (best-effort)
        continue-on-error: true
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        # pytest (not `unittest discover`): its output capture surfaces bugs
        # like modules reassigning sys.stdout/stderr at import time, which
        # unittest would silently tolerate.
        run: python -m pytest tests/ -v
