name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff black isort bandit

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Isort check
        run: isort --check --profile black --line-length 100 .

      - name: Bandit (high severity)
        run: bandit -r . -x ./tests,./.venv --severity-level high -q

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install --no-deps -e .

      - name: Install optional heavy deps (best-effort)
        continue-on-error: true
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: python -m unittest discover -s tests -v
