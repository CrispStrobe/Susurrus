name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    # Guards against the issue #12 class of bug: source code being excluded by
    # an over-broad .gitignore rule (so fresh clones silently miss modules).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Fail if any tracked source file is git-ignored
        run: |
          set -euo pipefail
          ignored=""
          while IFS= read -r f; do
            if git check-ignore -q "$f"; then
              ignored="$ignored$f"$'\n'
            fi
          done < <(git ls-files '*.py')
          if [ -n "$ignored" ]; then
            echo "::error::These tracked Python source files match a .gitignore rule:"
            echo "$ignored"
            echo "Anchor the offending rule (e.g. '/diarization/' not 'diarization/')."
            exit 1
          fi
          echo "OK: no tracked source files are git-ignored."

      - name: Verify the diarization package is present
        run: |
          set -euo pipefail
          for f in backends/diarization/__init__.py backends/diarization/manager.py \
                   backends/diarization/compat.py backends/diarization/progress.py; do
            test -f "$f" || { echo "::error::missing source file: $f (issue #12)"; exit 1; }
          done
          echo "OK: diarization package is committed."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting tools
        # Install from pyproject.toml [dev] — single source of truth for
        # pinned versions. Dependabot bumps pyproject.toml and CI follows
        # automatically, no drift.
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Isort check
        run: isort --check --profile black --line-length 100 .

      - name: Bandit (high severity)
        run: bandit -r . -x ./tests,./.venv --severity-level high -q

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install --no-deps -e .

      - name: Install optional heavy deps (best-effort)
        continue-on-error: true
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        # pytest (not `unittest discover`): its output capture surfaces bugs
        # like modules reassigning sys.stdout/stderr at import time, which
        # unittest would silently tolerate.
        run: python -m pytest tests/unit/ -v

  integration:
    # Advisory integration tests — downloads CrispASR binary, runs e2e tests.
    # Doesn't block PRs (continue-on-error). Only ubuntu (binary is Linux x86_64).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install --no-deps -e .
          sudo apt-get update -qq && sudo apt-get install -y -qq libopenblas-dev

      - name: Run integration tests
        env:
          SUSURRUS_INTEGRATION: "1"
        run: python -m pytest tests/integration/ -v --timeout=180
        timeout-minutes: 10

  pyinstaller-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui]"
          python -m pip install pyinstaller

      - name: Build Windows binary
        run: |
          pyinstaller `
            --onefile `
            --name susurrus-windows-x86_64 `
            --paths=. `
            --hidden-import=PyQt6 `
            --collect-submodules=PyQt6 `
            --collect-submodules=gui `
            --collect-submodules=utils `
            --collect-submodules=workers `
            --collect-submodules=backends `
            main.py

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: susurrus-windows-x86_64-smoke
          path: dist/susurrus-windows-x86_64.exe
