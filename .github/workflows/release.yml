name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: susurrus-linux-x86_64
            binary_name: susurrus-linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            asset_name: susurrus-macos-arm64
            binary_name: susurrus-macos-arm64
            archive_ext: zip
          - os: windows-latest
            asset_name: susurrus-windows-x86_64
            binary_name: susurrus-windows-x86_64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          python -m PyInstaller \
            --onefile \
            --name ${{ matrix.binary_name }} \
            --paths=. \
            --hidden-import=PyQt6 \
            --collect-submodules=PyQt6 \
            --collect-submodules=gui \
            --collect-submodules=utils \
            --collect-submodules=workers \
            --collect-submodules=backends \
            main.py

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          chmod +x ${{ matrix.binary_name }}
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.binary_name }}
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          chmod +x ${{ matrix.binary_name }}
          zip ${{ matrix.asset_name }}.zip ${{ matrix.binary_name }}
          shasum -a 256 ${{ matrix.asset_name }}.zip > ${{ matrix.asset_name }}.zip.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ matrix.binary_name }}.exe" -DestinationPath "${{ matrix.asset_name }}.zip"
          $hash = (Get-FileHash "${{ matrix.asset_name }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}.zip" | Out-File -Encoding ascii "${{ matrix.asset_name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}
            dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: build-binaries
    runs-on: ubuntu-latest
    continue-on-error: true
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
