version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Formatters pinned exactly — different versions produce different
      # output, breaking CI. Bump manually after verifying formatting.
      - dependency-name: "black"
      - dependency-name: "isort"
